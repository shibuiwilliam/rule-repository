name: Eval Harness

on:
  pull_request:
    paths:
      - 'apps/server/src/rulerepo_server/services/evaluation/**'
      - 'apps/server/src/rulerepo_server/services/domains/**'
      - 'apps/server/eval_harness/**'
      - 'apps/server/eval/**'

jobs:
  eval:
    name: Eval Harness Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: apps/server
        run: uv sync

      - name: Run eval harness (offline)
        working-directory: apps/server
        run: uv run python -m eval_harness.runner --all --threshold 0.05
