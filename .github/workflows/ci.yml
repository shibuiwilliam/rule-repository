name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint + type check + unit tests
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check --config pyproject.toml apps/server/src/ apps/server/tests/

      - name: Ruff lint
        run: uv run ruff check --config pyproject.toml apps/server/src/ apps/server/tests/

      - name: Mypy type check
        run: |
          cd apps/server && uv run --directory ../.. mypy --config-file ../../pyproject.toml src/ || true

      - name: Unit tests
        run: uv run pytest apps/server/tests/unit/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Frontend: lint + type check
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript check
        run: |
          # Generate next-env.d.ts (gitignored but needed for tsc path resolution)
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts
          pnpm typecheck

  # ---------------------------------------------------------------------------
  # SDK: tests
  # ---------------------------------------------------------------------------
  sdk:
    name: SDK Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run SDK tests
        run: uv run pytest packages/rule-client/tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker build smoke test
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker compose build server

      - name: Build frontend image
        run: docker compose build frontend
