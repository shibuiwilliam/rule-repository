# Tier 3 — Full stack deployment.
# Includes all services: Postgres, Elasticsearch, Neo4j, Redis, MCP.
# Equivalent to the root docker-compose.yml.
#
# Usage:
#   docker compose -f infra/compose/tier3.yml --project-directory . up --build
#   make up  (default)

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rule
      POSTGRES_PASSWORD: rule
      POSTGRES_DB: ruledb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rule -d ruledb"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  es-setup:
    image: curlimages/curl:latest
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./infra/elasticsearch:/setup:ro
    entrypoint: ["/bin/sh", "/setup/setup.sh"]
    restart: "no"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/ruledev1
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4jdata:/data
      - ./infra/neo4j/init.cypher:/tmp/init.cypher:ro
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ruledev1 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  neo4j-setup:
    image: neo4j:5-community
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_AUTH: neo4j/ruledev1
    volumes:
      - ./infra/neo4j/init.cypher:/init.cypher:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        cat /init.cypher | cypher-shell -u neo4j -p ruledev1 -a bolt://neo4j:7687 || true
        echo "Neo4j constraints initialized."
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: infra/docker/server.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rule:rule@postgres:5432/ruledb
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ruledev1
      NEO4J_ENABLED: "true"
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      MCP_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - file_storage:/tmp/rulerepo-files
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      target: dev
    depends_on:
      server:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      INTERNAL_API_URL: http://server:8000
    ports:
      - "3000:3000"

  mcp-server:
    build:
      context: .
      dockerfile: infra/docker/server.Dockerfile
    depends_on:
      server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rule:rule@postgres:5432/ruledb
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ruledev1
      NEO4J_ENABLED: "true"
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      MCP_TRANSPORT: sse
      MCP_PORT: "8001"
      MCP_ENABLED: "true"
    ports:
      - "8001:8001"
    command: ["rulerepo-mcp"]

  arq-worker:
    build:
      context: .
      dockerfile: infra/docker/server.Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rule:rule@postgres:5432/ruledb
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ruledev1
      NEO4J_ENABLED: "true"
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "arq", "rulerepo_server.workers.settings.WorkerSettings"]
    restart: "no"


volumes:
  pgdata:
  esdata:
  neo4jdata:
  file_storage:
