rules:
  - statement: "使用者は、労働者に、休憩時間を除き一週間について四十時間を超えて、労働させてはならない（労働基準法32条）"
    modality: MUST_NOT
    severity: CRITICAL
    scope: [hr/attendance, hr/overtime]
    tags: [labor-standards, working-hours, article-32]
    rationale: "Labor Standards Act Article 32 — 40-hour weekly limit"
    applicable_subject_types: [event]
    jurisdiction: JP
    legal_force: statutory

  - statement: "使用者は、当該事業場に、労働者の過半数で組織する労働組合又は労働者の過半数を代表する者との書面による協定をし、行政官庁に届け出た場合においては、その協定で定めるところによつて労働時間を延長し、又は休日に労働させることができる（労働基準法36条）"
    modality: MUST
    severity: CRITICAL
    scope: [hr/overtime]
    tags: [labor-standards, 36-agreement, overtime]
    rationale: "Labor Standards Act Article 36 — 36-agreement required for any overtime"
    applicable_subject_types: [event]
    jurisdiction: JP
    legal_force: statutory

  - statement: "時間外労働の上限は、原則として月45時間・年360時間とする（労働基準法36条4項）"
    modality: MUST_NOT
    severity: HIGH
    scope: [hr/overtime]
    tags: [labor-standards, overtime-cap, article-36]
    rationale: "Monthly overtime cap of 45 hours, annual cap of 360 hours"
    applicable_subject_types: [event]
    jurisdiction: JP
    legal_force: statutory

  - statement: "使用者は、少なくとも毎週一回の休日を与えなければならない（労働基準法35条）"
    modality: MUST
    severity: HIGH
    scope: [hr/attendance]
    tags: [labor-standards, rest-day, article-35]
    rationale: "Labor Standards Act Article 35 — at least one rest day per week"
    applicable_subject_types: [event]
    jurisdiction: JP
    legal_force: statutory

  - statement: "使用者は、その雇入れの日から起算して六箇月間継続勤務し全労働日の八割以上出勤した労働者に対して、十労働日の有給休暇を与えなければならない（労働基準法39条）"
    modality: MUST
    severity: HIGH
    scope: [hr/leave]
    tags: [labor-standards, paid-leave, article-39]
    rationale: "Labor Standards Act Article 39 — 10 days paid leave after 6 months"
    applicable_subject_types: [event]
    jurisdiction: JP
    legal_force: statutory
