[project]
name = "rulerepo-agentic"
version = "0.1.0"
description = "Agentic Rule Client — wraps Rule Client with AI agent capabilities"
requires-python = ">=3.13"
dependencies = [
    "rulerepo",
]

[tool.uv.sources]
rulerepo = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rulerepo_agentic"]
