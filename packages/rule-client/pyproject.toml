[project]
name = "rulerepo"
version = "0.1.0"
description = "Python SDK for the Rule Repository API"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28",
    "pydantic>=2.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "respx>=0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rulerepo"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
