[project]
name = "rulerepo-cli"
version = "0.1.0"
description = "CLI tools for Rule Repository — CI pipeline, agent hooks, and rule ingestion"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28",
    "click>=8.1",
    "rich>=13.0",
]

[project.scripts]
rulerepo-check = "rulerepo_cli.check:main"
rulerepo-hook = "rulerepo_cli.hook:main"
rulerepo-ingest = "rulerepo_cli.ingest:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rulerepo_cli"]
