        +def process_claim(claim: Claim) -> str:
        +    if claim.type == "medical":
        +        if claim.amount > 10000:
        +            if claim.has_prior_auth:
        +                if claim.provider_in_network:
        +                    if claim.deductible_met:
        +                        return "approved"
        +                    else:
        +                        if claim.amount > claim.remaining_deductible:
        +                            return "partial"
        +                        else:
        +                            return "denied"
        +                else:
        +                    return "out_of_network_review"
        +            else:
        +                return "auth_required"
