version: "1.0"
domain: "engineering"
description: "Golden dataset for code evaluation — naming, error handling, security, testing, documentation, imports, types, API design, logging, and patterns."
cases:
  - id: "engineering_001"
    description: "Function uses snake_case naming correctly"
    subject_kind: "code_diff"
    input_payload:
      diff: |
        +def calculate_total_price(items: list[Item]) -> Decimal:
        +    return sum(item.price * item.quantity for item in items)
      file_path: "src/pricing/calculator.py"
      language: "python"
    expected_verdict: "ALLOW"
    expected_rule_ids: []
    expected_reasoning_keywords: ["snake_case", "naming convention"]
    tags: ["naming"]
    difficulty: "easy"

  - id: "engineering_002"
