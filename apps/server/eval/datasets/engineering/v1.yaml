  - id: "engineering_049"
    description: "Complex business logic with comprehensive docstring and tests"
    subject_kind: "code_diff"
    input_payload:
      diff: |
        +def calculate_progressive_discount(
        +    order_total: Decimal,
        +    customer_tier: CustomerTier,
        +    loyalty_points: int,
        +) -> DiscountResult:
        +    """Calculate tiered discount based on order total, tier, and loyalty.
        +
        +    Discount tiers:
        +        - Bronze: 0-5% based on order total
        +        - Silver: 5-10% + loyalty point bonus
        +        - Gold: 10-15% + loyalty point bonus + free shipping
        +
        +    Args:
        +        order_total: Pre-discount order total (must be > 0).
        +        customer_tier: Customer loyalty tier.
        +        loyalty_points: Available loyalty points.
        +
        +    Returns:
        +        DiscountResult with computed discount amount and breakdown.
        +
        +    Raises:
        +        InvalidOrderError: If order_total <= 0.
        +    """
        +    if order_total <= 0:
        +        raise InvalidOrderError("Order total must be positive")
        +
        +    base_rate = TIER_BASE_RATES[customer_tier]
        +    volume_bonus = min(order_total / VOLUME_THRESHOLD, MAX_VOLUME_BONUS)
        +    loyalty_bonus = min(loyalty_points * POINT_VALUE, MAX_LOYALTY_BONUS)
        +
        +    total_rate = min(base_rate + volume_bonus + loyalty_bonus, MAX_DISCOUNT_RATE)
        +    discount_amount = order_total * total_rate
        +
        +    return DiscountResult(
        +        amount=discount_amount.quantize(Decimal("0.01")),
        +        rate=total_rate,
        +        breakdown=DiscountBreakdown(base=base_rate, volume=volume_bonus, loyalty=loyalty_bonus),
        +        free_shipping=customer_tier == CustomerTier.GOLD,
        +    )
      file_path: "src/pricing/discount.py"
      language: "python"
    expected_verdict: "ALLOW"
    expected_rule_ids: []
    expected_reasoning_keywords: ["docstring", "type hints", "constants", "validation"]
    tags: ["code-quality", "documentation"]
    difficulty: "easy"

