        - type: "dispute_resolution"
          text: "Any dispute arising out of this Agreement shall be finally settled by arbitration administered by the Japan Commercial Arbitration Association (JCAA) in Tokyo."
      parties_jurisdiction: ["JP", "JP"]
      jurisdiction: "JP"
    expected_verdict: "ALLOW"
    expected_rule_ids: []
    expected_reasoning_keywords: ["governing law", "Japan", "JCAA", "arbitration"]
    tags: ["governing-law", "dispute-resolution"]
    difficulty: "easy"

