        - type: "data_transfer"
          text: "Cross-border transfer of Personal Information shall comply with APPI requirements, including obtaining consent or ensuring adequate protection."
        - type: "incident_notification"
          text: "Processor shall notify Controller within 72 hours of becoming aware of any Personal Data Breach."
      jurisdiction: "JP"
    expected_verdict: "ALLOW"
