version: "1.0"
domain: "legal"
description: "Golden dataset for legal/contract evaluation — NDA, liability, indemnification, governing law, data protection, IP, force majeure, termination, and compliance clauses."
cases:
  - id: "legal_001"
    description: "NDA with standard mutual confidentiality and 2-year term"
    subject_kind: "clause_set"
    input_payload:
      document_type: "nda"
      clauses:
        - type: "confidentiality"
          text: "Each party agrees to hold the other party's Confidential Information in strict confidence and not to disclose it to any third party without prior written consent."
        - type: "term"
          text: "This Agreement shall remain in effect for two (2) years from the Effective Date."
        - type: "permitted_disclosure"
          text: "Disclosure is permitted to employees, contractors, and advisors who have a need to know and are bound by confidentiality obligations no less restrictive than those herein."
      jurisdiction: "JP"
    expected_verdict: "ALLOW"
    expected_rule_ids: []
    expected_reasoning_keywords: ["mutual", "confidentiality", "2-year", "standard"]
    tags: ["nda", "confidentiality"]
    difficulty: "easy"

  - id: "legal_002"
    description: "NDA missing definition of Confidential Information"
    subject_kind: "clause_set"
    input_payload:
      document_type: "nda"
      clauses:
        - type: "confidentiality"
          text: "The Receiving Party shall not disclose any information received from the Disclosing Party."
        - type: "term"
          text: "This Agreement shall remain in effect for three (3) years."
      missing_clauses: ["definition_of_confidential_information"]
      jurisdiction: "JP"
    expected_verdict: "DENY"
    expected_rule_ids: []
    expected_reasoning_keywords: ["definition", "Confidential Information", "undefined", "scope"]
    tags: ["nda", "confidentiality"]
    difficulty: "medium"

  - id: "legal_003"
    description: "Limitation of liability capped at contract value"
    subject_kind: "clause_set"
    input_payload:
      document_type: "service_agreement"
      clauses:
        - type: "limitation_of_liability"
          text: "Neither party's aggregate liability under this Agreement shall exceed the total fees paid or payable under this Agreement during the twelve (12) months preceding the event giving rise to liability."
        - type: "exclusion"
          text: "This limitation shall not apply to breaches of confidentiality, willful misconduct, or indemnification obligations."
      contract_value: 50000000
      jurisdiction: "JP"
    expected_verdict: "ALLOW"
    expected_rule_ids: []
    expected_reasoning_keywords: ["limitation", "12 months", "capped", "reasonable"]
    tags: ["liability", "limitation"]
    difficulty: "medium"

  - id: "legal_004"
    description: "No limitation of liability clause in high-value contract"
    subject_kind: "clause_set"
    input_payload:
      document_type: "service_agreement"
      clauses:
        - type: "services"
          text: "Provider shall deliver custom software development services as described in Exhibit A."
        - type: "payment"
          text: "Client shall pay Provider the sum of JPY 200,000,000 upon delivery."
      missing_clauses: ["limitation_of_liability"]
      contract_value: 200000000
      jurisdiction: "JP"
    expected_verdict: "DENY"
    expected_rule_ids: []
    expected_reasoning_keywords: ["limitation of liability", "missing", "high-value", "risk"]
    tags: ["liability", "limitation"]
    difficulty: "medium"

  - id: "legal_005"
    description: "Unlimited liability accepted by vendor"
    subject_kind: "clause_set"
    input_payload:
      document_type: "service_agreement"
      clauses:
        - type: "limitation_of_liability"
          text: "Provider accepts unlimited liability for all damages arising from or related to this Agreement, including consequential and indirect damages."
      contract_value: 100000000
      party_role: "provider"
      jurisdiction: "JP"
    expected_verdict: "DENY"
    expected_rule_ids: []
    expected_reasoning_keywords: ["unlimited", "liability", "consequential", "unreasonable"]
    tags: ["liability", "limitation"]
    difficulty: "easy"

