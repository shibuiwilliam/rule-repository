        - type: "indemnification_cap"
          text: "Provider's indemnification obligations shall not exceed twice the annual contract value."
      jurisdiction: "JP"
    expected_verdict: "ALLOW"
    expected_rule_ids: []
    expected_reasoning_keywords: ["indemnification", "notice", "capped", "third-party"]
    tags: ["indemnification"]
    difficulty: "medium"

