    description: "Product advertisement with accurate factual claims and proper sourcing"
    subject_kind: "creative"
    input_payload:
      content_type: "web_advertisement"
      text: "Our SSD delivers read speeds of up to 7,000 MB/s, verified by independent testing from TechBench Labs (Report #TB-2026-0412)."
      medium: "web"
      target_audience: "general"
      jurisdiction: "JP"
    expected_verdict: "ALLOW"
    expected_rule_ids: []
    expected_reasoning_keywords: ["factual", "verified", "source", "accurate"]
    tags: ["claims", "accuracy"]
    difficulty: "easy"

