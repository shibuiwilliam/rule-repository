site_name: Rule Repository
site_description: Manage, search, and enforce natural-language rules using LLMs and AI agents
repo_url: https://github.com/shibuiwilliam/rule-repository

theme:
  name: material
  palette:
    primary: blue
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - Docker Compose: getting-started/docker-compose.md
  - Architecture:
    - Overview: architecture/overview.md
    - Evaluation Engine: architecture/evaluation-engine.md
    - Data Stores: architecture/data-stores.md
    - Rule Discovery: architecture/discovery.md
    - Rule Playground: architecture/playground.md
    - Snapshots: architecture/snapshots.md
    - Federation: architecture/federation.md
    - Batched Evaluation: architecture/batch-evaluation.md
    - Rule Maturity Model: architecture/maturity-model.md
    - Auto-Remediation: architecture/remediation.md
  - API Reference:
    - REST API: api/rest.md
    - Search API: api/search.md
    - Evaluate API: api/evaluate.md
    - Intent API: api/intent.md
    - Discovery API: api/discovery.md
    - Feedback API: api/feedback.md
    - Playground API: api/playground.md
    - Alerts API: api/alerts.md
    - Snapshots API: api/snapshots.md
    - Federation API: api/federation.md
    - Projects API: api/projects.md
    - Templates & Import: api/templates.md
  - SDKs:
    - Rule Client (Python): sdks/rule-client.md
    - Agentic Client: sdks/agentic-client.md
    - CLI Tools: sdks/cli.md
    - Context Generator: sdks/context-generator.md
  - Integrations:
    - MCP Server: integrations/mcp.md
    - GitHub PR Review: integrations/github.md
    - CI Pipeline: integrations/ci.md
    - Agent Hooks: integrations/agent-hooks.md
    - Background Workers: integrations/workers.md
  - Intelligence:
    - Dashboard: intelligence/dashboard.md
    - Health Scoring: intelligence/health.md
    - Feedback Loop: intelligence/feedback.md
    - Correction Flywheel: intelligence/flywheel.md
    - Compliance Dashboard: intelligence/compliance-dashboard.md
    - Agent Performance: intelligence/agent-tracking.md
    - Rule Effectiveness: intelligence/effectiveness.md
    - Weekly Digest: intelligence/digest.md
  - Development:
    - Contributing: dev/contributing.md
    - Testing: dev/testing.md
  - Reference:
    - Scope Naming: scope-naming.md
  - Changelog:
    - Phase 7: 09_changelog/phase7.md
    - Phase 7 Status: 09_changelog/phase7-status.md
    - Phase 8: 09_changelog/phase8.md
  - ADR:
    - "001: Three-Store Architecture": adr/001-three-store-architecture.md
    - "003: Classification and RLS": adr/003-classification-and-rls.md
    - "004: Contract Clause Engine": adr/004-contract-clause-engine.md
    - "005: Event Engine Temporal Modes": adr/005-event-engine-temporal-modes.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
